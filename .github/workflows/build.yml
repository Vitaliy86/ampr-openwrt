name: Build OpenWrt APK

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            gettext \
            git \
            libncurses-dev \
            libssl-dev \
            python3 \
            rsync \
            unzip \
            zlib1g-dev \
            file \
            wget

      - name: Download OpenWrt SDK
        run: |
          wget https://downloads.openwrt.org/releases/25.12.2/targets/mediatek/filogic/openwrt-sdk-25.12.2-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64.tar.zst

      - name: Extract SDK
        run: |
          tar --zstd -xf openwrt-sdk-*.tar.zst

      - name: Prepare package feed
        run: |
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*")
          mkdir -p $SDK_DIR/package/ampr
          cp -r ./* $SDK_DIR/package/ampr/

      - name: Update feeds
        run: |
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*")
          cd $SDK_DIR
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build package
        run: |
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*")
          cd $SDK_DIR

          make defconfig

          make package/ampr/compile V=s -j$(nproc)

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-apk
          path: |
            */bin/packages/**/*.apk
