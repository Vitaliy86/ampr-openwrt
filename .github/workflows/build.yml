name: OpenWrt 25 AMPR APK Build (Parallel)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib gettext git libncurses-dev \
            libssl-dev python3 rsync unzip zlib1g-dev \
            wget file tar

      - name: Download OpenWrt SDK
        run: |
          wget -q \
            https://downloads.openwrt.org/releases/25.12.2/targets/mediatek/filogic/openwrt-sdk-25.12.2-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64.tar.zst

      - name: Extract SDK
        run: |
          tar --zstd -xf openwrt-sdk-*.tar.zst

      - name: Detect SDK
        run: |
          echo "SDK_DIR=$(find . -maxdepth 1 -type d -name 'openwrt-sdk-*')" >> $GITHUB_ENV

      - name: Add AMPR feed
        run: |
          echo "src-link ampr $GITHUB_WORKSPACE" >> $SDK_DIR/feeds.conf.default

      - name: Update feeds
        run: |
          cd $SDK_DIR
          ./scripts/feeds update ampr

      - name: Install feed packages
        run: |
          cd $SDK_DIR
          ./scripts/feeds install -a -p ampr

      - name: Configure build system
        run: |
          cd $SDK_DIR
          make defconfig

      # ─────────────────────────────
      # PARALLEL BUILD (key part)
      # ─────────────────────────────
      - name: Build AMPR packages in parallel
        run: |
          cd $SDK_DIR

          make package/amprd/compile \
               package/ampr-ripd/compile \
               -j$(nproc) V=s

      - name: Collect artifacts
        run: |
          find $SDK_DIR/bin/packages/ -type f -name "*.apk"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ampr-openwrt-apk
          path: |
            ${{ env.SDK_DIR }}/bin/packages/**/*.apk
