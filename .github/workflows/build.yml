name: OpenWrt 25.12.3 AMPR Build (ccache + parallel)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────
      # CCACHE CACHE
      # ─────────────────────────────
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib gettext git libncurses-dev \
            libssl-dev python3 rsync unzip zlib1g-dev \
            wget file tar ccache zstd

      - name: Download OpenWrt SDK
        id: download_sdk
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/25.12.3/targets/mediatek/filogic/openwrt-sdk-25.12.3-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          
          echo "Downloading SDK from: $SDK_URL"
          
          if ! wget -q --timeout=60 --tries=3 "$SDK_URL"; then
            echo "::error::Failed to download OpenWrt SDK"
            exit 1
          fi
          
          if [ ! -f openwrt-sdk-*.tar.zst ]; then
            echo "::error::SDK file not found after download"
            exit 1
          fi
          
          echo "SDK downloaded successfully"

      - name: Extract SDK
        run: |
          if ! tar --zstd -xf openwrt-sdk-*.tar.zst; then
            echo "::error::Failed to extract SDK"
            exit 1
          fi
          echo "SDK extracted successfully"

      - name: Detect SDK path
        run: |
          SDK_DIR=$(find . -maxdepth 1 -type d -name 'openwrt-sdk-*')
          if [ -z "$SDK_DIR" ]; then
            echo "::error::SDK directory not found"
            exit 1
          fi
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV
          echo "SDK directory: $SDK_DIR"

      # ─────────────────────────────
      # ENABLE CCACHE
      # ─────────────────────────────
      - name: Enable ccache
        run: |
          ccache -M 5G || true
          ccache --set-config=compression=true || true

      # ─────────────────────────────
      # ADD LOCAL FEED
      # ─────────────────────────────
      - name: Add AMPR feed
        run: |
          echo "src-link ampr $GITHUB_WORKSPACE" >> $SDK_DIR/feeds.conf.default
          cat $SDK_DIR/feeds.conf.default

      - name: Update feeds
        run: |
          cd $SDK_DIR
          if ! ./scripts/feeds update ampr; then
            echo "::error::Failed to update AMPR feed"
            exit 1
          fi

      - name: Install feed packages
        run: |
          cd $SDK_DIR
          if ! ./scripts/feeds install -a -p ampr; then
            echo "::error::Failed to install AMPR feed packages"
            exit 1
          fi

      - name: Configure build system
        run: |
          cd $SDK_DIR
          echo "CONFIG_CCACHE=y" >> .config
          if ! make defconfig; then
            echo "::error::Failed to configure build system"
            exit 1
          fi

      # ─────────────────────────────
      # BUILD (PARALLEL + CCACHE)
      # ─────────────────────────────
      - name: Build AMPR packages
        run: |
          cd $SDK_DIR

          export CCACHE_DIR=$HOME/.ccache
          export PATH="/usr/lib/ccache:$PATH"
          
          echo "Building with $(nproc) cores..."
          
          if ! make package/amprd/compile \
                   package/ampr-ripd/compile \
                   -j$(nproc) V=s; then
            echo "::error::Build failed"
            exit 1
          fi
          
          echo "Build completed successfully"

      # ─────────────────────────────
      # STATS
      # ─────────────────────────────
      - name: Show ccache stats
        run: |
          ccache -s

      - name: List artifacts
        run: |
          echo "=== Available packages ==="
          find $SDK_DIR/bin/packages/ -type f \( -name "*.ipk" -o -name "*.apk" \) 2>/dev/null || echo "No packages found"
          echo "=== Directory structure ==="
          ls -la $SDK_DIR/bin/packages/ 2>/dev/null || echo "bin/packages not found"

      - name: Upload packages
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ampr-openwrt-packages
          path: |
            ${{ env.SDK_DIR }}/bin/packages/**/*
          retention-days: 30
