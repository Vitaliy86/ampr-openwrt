name: OpenWrt APK Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            gettext \
            git \
            libncurses-dev \
            libssl-dev \
            python3 \
            rsync \
            unzip \
            zlib1g-dev \
            wget \
            file

      - name: Download OpenWrt SDK
        run: |
          wget https://downloads.openwrt.org/releases/25.12.2/targets/mediatek/filogic/openwrt-sdk-25.12.2-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64.tar.zst

      - name: Extract SDK
        run: |
          tar --zstd -xf openwrt-sdk-*.tar.zst

      - name: Detect SDK
        run: |
          echo "SDK_DIR=$(find . -maxdepth 1 -type d -name 'openwrt-sdk-*')" >> $GITHUB_ENV

      - name: Link current project
        run: |
          mkdir -p $SDK_DIR/package/custom

          ln -s \
            $GITHUB_WORKSPACE \
            $SDK_DIR/package/custom/ampr-openwrt

      - name: Update feeds
        run: |
          cd $SDK_DIR
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure
        run: |
          cd $SDK_DIR
          make defconfig

      - name: Build APK
        run: |
          cd $SDK_DIR

          make package/custom/ampr-openwrt/compile \
            V=s \
            -j$(nproc)

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-apk
          path: |
            ${{ env.SDK_DIR }}/bin/packages/**/*.apk
