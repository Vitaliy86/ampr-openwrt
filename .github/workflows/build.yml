name: OpenWrt 25 AMPR Build (ccache + parallel)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────
      # CCACHE CACHE
      # ─────────────────────────────
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib gettext git libncurses-dev \
            libssl-dev python3 rsync unzip zlib1g-dev \
            wget file tar ccache

      - name: Download OpenWrt SDK
        run: |
          wget -q \
            https://downloads.openwrt.org/releases/25.12.2/targets/mediatek/filogic/openwrt-sdk-25.12.2-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64.tar.zst

      - name: Extract SDK
        run: |
          tar --zstd -xf openwrt-sdk-*.tar.zst

      - name: Detect SDK path
        run: |
          echo "SDK_DIR=$(find . -maxdepth 1 -type d -name 'openwrt-sdk-*')" >> $GITHUB_ENV

      # ─────────────────────────────
      # ENABLE CCACHE
      # ─────────────────────────────
      - name: Enable ccache
        run: |
          ccache -M 5G || true
          ccache --set-config=compression=true || true

      # ─────────────────────────────
      # ADD LOCAL FEED
      # ─────────────────────────────
      - name: Add AMPR feed
        run: |
          echo "src-link ampr $GITHUB_WORKSPACE" >> $SDK_DIR/feeds.conf.default

      - name: Update feeds
        run: |
          cd $SDK_DIR
          ./scripts/feeds update ampr

      - name: Install feed packages
        run: |
          cd $SDK_DIR
          ./scripts/feeds install -a -p ampr

      - name: Configure build system
        run: |
          cd $SDK_DIR
          echo "CONFIG_CCACHE=y" >> .config
          make defconfig

      # ─────────────────────────────
      # BUILD (PARALLEL + CCACHE)
      # ─────────────────────────────
      - name: Build AMPR packages
        run: |
          cd $SDK_DIR

          export CCACHE_DIR=$HOME/.ccache
          export PATH="/usr/lib/ccache:$PATH"

          make package/amprd/compile \
               package/ampr-ripd/compile \
               -j$(nproc) V=s

      # ─────────────────────────────
      # STATS
      # ─────────────────────────────
      - name: Show ccache stats
        run: |
          ccache -s

      - name: List artifacts
        run: |
          find $SDK_DIR/bin/packages/ -type f -name "*.apk"

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: ampr-openwrt-apk
          path: |
            ${{ env.SDK_DIR }}/bin/packages/**/*.apk
